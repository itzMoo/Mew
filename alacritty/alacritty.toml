# ============================================================================
#  Alacritty — Terminal Emulator Configuration
#  Author   : Mo
#  Updated  : 2026-03-05
#  Platforms: Linux · macOS · Windows  (cross-platform, zero OS-specific deps)
#  Docs     : https://alacritty.org/config-alacritty.html
# ============================================================================
#
#  ╔══════════════════════════════════════════════════════════════════════════╗
#  ║  OS QUICK-SWITCH  — three places differ per OS, each boxed in-place     ║
#  ║  Uncomment your OS line, keep the other two commented.                  ║
#  ║                                                                         ║
#  ║  Section   Setting              Linux        macOS        Windows       ║
#  ║  § 2       window decorations   "None"       "Buttonless" "Full"        ║
#  ║  § 8       hints URL opener     xdg-open     open         cmd start     ║
#  ║                                                                         ║
#  ║  THEME  — managed externally via shell alias (see § 0)                  ║
#  ║  Setup once:                                                            ║
#  ║    git clone https://github.com/alacritty/alacritty-theme \             ║
#  ║        ~/.config/alacritty/themes                                       ║
#  ║  Switch anytime (bash/zsh):  ath catppuccin_mocha                       ║
#  ║  Switch anytime (PowerShell): Set-AlacrittyTheme catppuccin_mocha       ║
#  ║  Browse themes: ls ~/.config/alacritty/themes/                          ║
#  ╚══════════════════════════════════════════════════════════════════════════╝

# ─────────────────────────────────────────────────────────────────────────────
# § 0  THEME IMPORT  — points to whichever theme file the shell alias placed
# ─────────────────────────────────────────────────────────────────────────────
#
#  Shell aliases — add ONE block to your shell rc (bashrc / zshrc / profile):
#
#  ── bash / zsh ────────────────────────────────────────────────────────────
#  ath() { cp ~/.config/alacritty/themes/${1}.toml ~/.config/alacritty/theme.toml; }
#  # usage: ath catppuccin_mocha | ath tokyo_night_storm | ath gruvbox_dark
#
#  ── PowerShell (profile.ps1) ──────────────────────────────────────────────
#  function Set-AlacrittyTheme($n) {
#    Copy-Item "$HOME\.config\alacritty\themes\$n.toml" `
#              "$HOME\.config\alacritty\theme.toml" }
#  Set-Alias ath Set-AlacrittyTheme
#  # usage: ath catppuccin_mocha
#
#  First-time setup (run once in terminal):
#    git clone https://github.com/alacritty/alacritty-theme ~/.config/alacritty/themes
#    ath catppuccin_mocha        # set initial theme
#
# ┌─── ACTIVE IMPORT ───────────────────────────────────────────────────────┐

[general]
import = ["~/.config/alacritty/theme.toml"]   # managed by `ath` alias

# └─────────────────────────────────────────────────────────────────────────┘
#
# ┌─── ALTERNATIVE: Arch Linux + omarchy (replaces import above) ───────────┐
# [general]
# import = ["~/.config/omarchy/current/theme/alacritty.toml"]
# └─────────────────────────────────────────────────────────────────────────┘

# ─────────────────────────────────────────────────────────────────────────────
# § 1  ENVIRONMENT
# ─────────────────────────────────────────────────────────────────────────────

[env]
TERM      = "xterm-256color"
COLORTERM = "truecolor"   # advertise 24-bit colour support to CLI tools
CLICOLOR  = "1"           # enable colour in ls and many CLI programs

# ─────────────────────────────────────────────────────────────────────────────
# § 2  WINDOW
# ─────────────────────────────────────────────────────────────────────────────

[window]
title           = "Alacritty"
dynamic_title   = true        # let the shell / running app update the title
opacity         = 0.95
blur            = true        # compositor-assisted blur (Hyprland / macOS / DWM)
startup_mode    = "Windowed"  # Windowed | Maximized | Fullscreen | SimpleFullscreen
dynamic_padding = false

# ┌─── OS-SPECIFIC: window decorations ─────────────────────────────────────┐
decorations = "None"          # Linux  / Wayland  — WM draws the chrome
# decorations = "Buttonless"  # macOS             — hide traffic-light only
# decorations = "Full"        # Windows / X11     — OS-native title bar
# └─────────────────────────────────────────────────────────────────────────┘

[window.padding]
x = 14
y = 14

# ─────────────────────────────────────────────────────────────────────────────
# § 3  FONT
# ─────────────────────────────────────────────────────────────────────────────

[font]
size                = 9.0
builtin_box_drawing = true    # crisp box/block glyphs without a patched font

[font.offset]                 # line-height tweak — shifts all glyphs uniformly
x = 0
y = 1

[font.glyph_offset]           # per-glyph origin (use sparingly)
x = 0
y = 0

[font.normal]
family = "CaskaydiaMono Nerd Font"
style  = "Regular"

[font.bold]
family = "CaskaydiaMono Nerd Font"
style  = "Bold"

[font.italic]
family = "CaskaydiaMono Nerd Font"
style  = "Italic"

[font.bold_italic]
family = "CaskaydiaMono Nerd Font"
style  = "Bold Italic"

# ─────────────────────────────────────────────────────────────────────────────
# § 4  CURSOR
# ─────────────────────────────────────────────────────────────────────────────

[cursor]
blink_interval   = 750    # ms between blink phases
blink_timeout    = 0      # seconds idle before blinking stops (0 = never stop)
unfocused_hollow = true   # hollow cursor when window loses focus
thickness        = 0.15   # beam/underline width as fraction of cell width

[cursor.style]
shape    = "Beam"   # Block | Underline | Beam
blinking = "On"     # Never | Off | On | Always

[cursor.vi_mode_style]
shape    = "Block"  # visually distinct in vi-mode
blinking = "Off"

# ─────────────────────────────────────────────────────────────────────────────
# § 5  SCROLLBACK
# ─────────────────────────────────────────────────────────────────────────────

[scrollback]
lines = 10000

# ─────────────────────────────────────────────────────────────────────────────
# § 6  MOUSE
# ─────────────────────────────────────────────────────────────────────────────

[mouse]
hide_when_typing = true
bindings = [
  { mouse = "Middle", action = "PasteSelection" },  # middle-click → paste primary
]

# ─────────────────────────────────────────────────────────────────────────────
# § 7  SELECTION
# ─────────────────────────────────────────────────────────────────────────────

[selection]
save_to_clipboard     = true
semantic_escape_chars = ",│`|:\"' ()[]{}<>\t"

# ─────────────────────────────────────────────────────────────────────────────
# § 8  HINTS — clickable URLs  (Ctrl+Shift+U or mouse click)
#   Uncomment the ONE command line matching your OS:
# ─────────────────────────────────────────────────────────────────────────────

[hints]
alphabet = "jfkdls;ahgurieowpq"

[[hints.enabled]]
# ┌─── OS-SPECIFIC: URL opener ──────────────────────────────────────────────┐
command         = "xdg-open"                                          # Linux
# command       = "open"                                              # macOS
# command       = { program = "cmd", args = ["/c", "start", ""] }    # Windows
# └─────────────────────────────────────────────────────────────────────────┘
hyperlinks      = true
post_processing = true
persist         = false
binding         = { key = "U", mods = "Control|Shift" }
mouse           = { enabled = true, mods = "None" }
regex           = "(ipfs:|ipns:|magnet:|mailto:|gemini://|gopher://|https://|http://|news:|file:|git://|ssh:|ftp://)[^\u0000-\u001F\u007F-\u009F<>\"\\s{-}\\^⟨⟩`]+"

# ─────────────────────────────────────────────────────────────────────────────
# § 9  BELL
# ─────────────────────────────────────────────────────────────────────────────

[bell]
animation = "Linear"
duration  = 0           # 0 ms = completely silent
color     = "#ffffff"

# ─────────────────────────────────────────────────────────────────────────────
# § 10  KEYBOARD BINDINGS
# ─────────────────────────────────────────────────────────────────────────────

[keyboard]
bindings = [
  # ── Clipboard ──────────────────────────────────────────────────────────────
  { key = "C",      mods = "Control|Shift", action = "Copy"             },
  { key = "V",      mods = "Control|Shift", action = "Paste"            },
  { key = "Insert", mods = "Control",       action = "Copy"             },  # legacy
  { key = "Insert", mods = "Shift",         action = "Paste"            },  # legacy

  # ── Font size ──────────────────────────────────────────────────────────────
  { key = "Plus",   mods = "Control",       action = "IncreaseFontSize" },
  { key = "Minus",  mods = "Control",       action = "DecreaseFontSize" },
  { key = "0",      mods = "Control",       action = "ResetFontSize"    },

  # ── Scrollback ─────────────────────────────────────────────────────────────
  { key = "PageUp",   mods = "Shift",         action = "ScrollPageUp"   },
  { key = "PageDown", mods = "Shift",         action = "ScrollPageDown" },
  { key = "Home",     mods = "Shift",         action = "ScrollToTop"    },
  { key = "End",      mods = "Shift",         action = "ScrollToBottom" },
  { key = "Up",       mods = "Control|Shift", action = "ScrollLineUp"   },
  { key = "Down",     mods = "Control|Shift", action = "ScrollLineDown" },

  # ── History ────────────────────────────────────────────────────────────────
  { key = "K",      mods = "Control|Shift", action = "ClearHistory"    },

  # ── Vi mode ────────────────────────────────────────────────────────────────
  { key = "Space",  mods = "Control|Shift", action = "ToggleViMode"    },

  # ── Window ─────────────────────────────────────────────────────────────────
  { key = "Return", mods = "Control|Shift", action = "CreateNewWindow"  },
  { key = "F11",                            action = "ToggleFullscreen" },
]

# ─────────────────────────────────────────────────────────────────────────────
# § 11  COLORS  — no hardcoded colors here
#   Theme is loaded via import in § 0 from ~/.config/alacritty/theme.toml
#   Switch theme with:  ath <theme-name>  (see alias setup in § 0)
#   Browse 300+ themes: https://github.com/alacritty/alacritty-theme
# ─────────────────────────────────────────────────────────────────────────────

# ─────────────────────────────────────────────────────────────────────────────
# § 12  DEBUG  — all off for daily use; flip flags when diagnosing issues
# ─────────────────────────────────────────────────────────────────────────────

[debug]
render_timer       = false
persistent_logging = false
log_level          = "Warn"   # Off | Error | Warn | Info | Debug | Trace
renderer           = "None"   # None | OpenGl | Software
print_events       = false
highlight_damage   = false
